# MADA1 Motor Selection Rules
# Based on mada1.md table structure

metadata:
  name: "MADA1 Motor Selection Rules"
  version: "1.0"
  description: "Rules for selecting motor model based on speed, load (Q), travel length (TL), and decoration weight"

# Q range definitions
qRanges:
  - id: "Q1"
    min: 0
    max: 400
    label: "Q <= 400"
  - id: "Q2"
    min: 400
    max: 450
    label: "400 < Q <= 450"
  - id: "Q3"
    min: 450
    max: 500
    label: "450 < Q <= 500"
  - id: "Q4"
    min: 500
    max: 630
    label: "500 < Q <= 630"
  - id: "Q5"
    min: 630
    max: 800
    label: "630 < Q <= 800"
  - id: "Q6"
    min: 800
    max: 900
    label: "800 < Q <= 900"
  - id: "Q7"
    min: 900
    max: 1000
    label: "900 < Q <= 1000"
  - id: "Q8"
    min: 1000
    max: 1025
    label: "1000 < Q <= 1025"
  - id: "Q9"
    min: 1025
    max: 1050
    label: "1025 < Q <= 1050"
  - id: "Q10"
    min: 1050
    max: 1155
    label: "1050 < Q <= 1155"
  - id: "Q11"
    min: 1155
    max: 1200
    label: "1155 < Q <= 1200"
  - id: "Q12"
    min: 1200
    max: 1275
    label: "1200 < Q <= 1275"
  - id: "Q13"
    min: 1275
    max: 1365
    label: "1275 < Q <= 1365"
  - id: "Q14"
    min: 1365
    max: 1600
    label: "1365 < Q <= 1600"
  - id: "Q15"
    min: 1600
    max: 1800
    label: "1600 < Q <= 1800"
  - id: "Q16"
    min: 1800
    max: 2000
    label: "1800 < Q <= 2000"
  - id: "Q17"
    min: 2000
    max: 2550
    label: "2000 < Q <= 2550"

# Speed range definitions
speedRanges:
  - id: "S1"
    value: 3
  - id: "S2"
    value: 2.5
  - id: "S3"
    value: 2
  - id: "S4"
    value: 1.75
  - id: "S5"
    value: 1.6
  - id: "S6"
    value: 1

# Rule matrix: speed x Q range
# Each cell contains rules with conditions
rules:
  # Speed = 1 (row 8 in mada1.md)
  - speed: 1
    qRange: "Q1"  # Q <= 400
    motor: "NMX05"
    conditions: []

  - speed: 1
    qRange: "Q2"  # 400 < Q <= 450
    rules:
      - motor: "NMX05"
        conditions:
          - field: "Q"
            operator: "between"
            min: 400
            max: 480
          - field: "TL"
            operator: "<="
            value: 20
          - field: "WGT_ACTUAL_EXTRA_DECO_TOTAL"
            operator: "<="
            value: 50
      - motor: "NMX07"
        conditions:
          - field: "Q"
            operator: "between"
            min: 400
            max: 480
          - type: "OR"
            rules:
              - field: "WGT_ACTUAL_EXTRA_DECO_TOTAL"
                operator: ">"
                value: 50
              - field: "TL"
                operator: ">"
                value: 20
      - motor: "NMX07"
        conditions:
          - field: "Q"
            operator: ">"
            value: 480

  - speed: 1
    qRange: "Q3"  # 450 < Q <= 500
    rules:
      - motor: "NMX05"
        conditions:
          - field: "Q"
            operator: "between"
            min: 400
            max: 480
          - field: "TL"
            operator: "<="
            value: 20
          - field: "WGT_ACTUAL_EXTRA_DECO_TOTAL"
            operator: "<="
            value: 50
      - motor: "NMX07"
        conditions:
          - field: "Q"
            operator: "between"
            min: 400
            max: 480
          - type: "OR"
            rules:
              - field: "WGT_ACTUAL_EXTRA_DECO_TOTAL"
                operator: ">"
                value: 50
              - field: "TL"
                operator: ">"
                value: 20
      - motor: "NMX07"
        conditions:
          - field: "Q"
            operator: ">"
            value: 480

  - speed: 1
    qRange: "Q4"  # 500 < Q <= 630
    rules:
      - motor: "NMX07"
        conditions:
          - field: "TL"
            operator: "<="
            value: 25
          - field: "HMC"
            operator: "=="
            value: true
          - field: "WGT_ACTUAL_EXTRA_DECO_TOTAL"
            operator: "<="
            value: 150
      - motor: "NMX07"
        conditions:
          - field: "TL"
            operator: "<="
            value: 25
          - field: "HMC"
            operator: "=="
            value: false
          - field: "WGT_ACTUAL_EXTRA_DECO_TOTAL"
            operator: "<="
            value: 100
      - motor: "NMX07"
        conditions:
          - field: "TL"
            operator: "between"
            min: 25
            max: 55
          - field: "HMC"
            operator: "=="
            value: true
          - field: "WGT_ACTUAL_EXTRA_DECO_TOTAL"
            operator: "<="
            value: 100
      - motor: "NMX07"
        conditions:
          - field: "TL"
            operator: "between"
            min: 25
            max: 55
          - field: "HMC"
            operator: "=="
            value: false
          - field: "WGT_ACTUAL_EXTRA_DECO_TOTAL"
            operator: "<="
            value: 50
      - motor: "NMX08"
        conditions:
          - field: "TL"
            operator: "<="
            value: 25
          - field: "HMC"
            operator: "=="
            value: true
          - field: "WGT_ACTUAL_EXTRA_DECO_TOTAL"
            operator: ">"
            value: 150
      - motor: "NMX08"
        conditions:
          - field: "TL"
            operator: "<="
            value: 25
          - field: "HMC"
            operator: "=="
            value: false
          - field: "WGT_ACTUAL_EXTRA_DECO_TOTAL"
            operator: ">"
            value: 100
      - motor: "NMX08"
        conditions:
          - field: "TL"
            operator: "between"
            min: 25
            max: 55
          - field: "HMC"
            operator: "=="
            value: true
          - field: "WGT_ACTUAL_EXTRA_DECO_TOTAL"
            operator: "between"
            min: 100
            max: 350
      - motor: "NMX08"
        conditions:
          - field: "TL"
            operator: "between"
            min: 25
            max: 55
          - field: "HMC"
            operator: "=="
            value: false
          - field: "WGT_ACTUAL_EXTRA_DECO_TOTAL"
            operator: "between"
            min: 50
            max: 350
      - motor: "NMX11-1000"
        conditions:
          - field: "TL"
            operator: ">"
            value: 55

  - speed: 1
    qRange: "Q5"  # 630 < Q <= 800
    rules:
      - motor: "NMX08"
        conditions:
          - type: "OR"
            rules:
              - field: "CAR_TYPE"
                operator: "=="
                value: "SEC"
              - field: "CAR_TYPE"
                operator: "=="
                value: "TTC"
          - field: "WGT_CAR_ESTIMATED_EXTRA"
            operator: "<="
            value: 300
      - motor: "NMX11"
        conditions:
          - type: "OR"
            rules:
              - field: "CAR_TYPE"
                operator: "=="
                value: "SEC"
              - field: "CAR_TYPE"
                operator: "=="
                value: "TTC"
          - field: "WGT_CAR_ESTIMATED_EXTRA"
            operator: ">"
            value: 300

  - speed: 1
    qRange: "Q6"  # 800 < Q <= 900
    rules:
      - motor: "NMX11-1000"
        conditions:
          - field: "WGT_CAR_DECORATION_TOTAL"
            operator: "<="
            value_expr: "load * 0.45"
      - motor: "NMX11-1150"
        conditions:
          - field: "WGT_CAR_DECORATION_TOTAL"
            operator: "between"
            min_expr: "load * 0.35"
            max: 620
      - motor: "NMX14S"
        conditions:
          - field: "WGT_CAR_DECORATION_TOTAL"
            operator: "between"
            min: 620
            max: 740
          - field: "REGION"
            operator: "=="
            value: "CHN"
      - motor: "NMX14"
        conditions:
          - field: "WGT_CAR_DECORATION_TOTAL"
            operator: "between"
            min: 620
            max: 740
          - field: "REGION"
            operator: "!="
            value: "CHN"

  # Speed = 1.6 (row 7 in mada1.md)
  - speed: 1.6
    qRange: "Q1"  # Q <= 400
    motor: "NMX07"
    conditions: []

  - speed: 1.6
    qRange: "Q2"  # 400 < Q <= 450
    motor: "NMX07"
    conditions: []

  - speed: 1.6
    qRange: "Q3"  # 450 < Q <= 500
    motor: "NMX07"
    conditions: []

  # Speed = 1.75 (row 6 in mada1.md)
  - speed: 1.75
    qRange: "Q1"  # Q <= 400
    motor: "NMX07"
    conditions: []

  - speed: 1.75
    qRange: "Q2"  # 400 < Q <= 450
    motor: "NMX07"
    conditions: []

  - speed: 1.75
    qRange: "Q3"  # 450 < Q <= 500
    motor: "NMX07"
    conditions: []

  # Speed = 2 (row 5 in mada1.md)
  - speed: 2
    qRange: "Q3"  # 450 < Q <= 500
    motor: "NMX11"
    conditions: []

  - speed: 2
    qRange: "Q4"  # 500 < Q <= 630
    motor: "NMX11-1150"
    conditions: []

  - speed: 2
    qRange: "Q5"  # 630 < Q <= 800
    motor: "NMX11-1150"
    conditions: []

  # Speed = 2.5 (row 4 in mada1.md)
  - speed: 2.5
    qRange: "Q4"  # 500 < Q <= 630
    motor: "NMX11-1150"
    conditions: []

  - speed: 2.5
    qRange: "Q5"  # 630 < Q <= 800
    motor: "NMX11-1150"
    conditions: []

  # Speed = 3 (row 3 in mada1.md)
  - speed: 3
    qRange: "Q6"  # 800 < Q <= 900
    motor: "NMX20"
    conditions:
      - field: "WGT_CAR_DECORATION_TOTAL"
        operator: "<="
        value: 780

  - speed: 3
    qRange: "Q7"  # 900 < Q <= 1000
    motor: "NMX20"
    conditions:
      - field: "WGT_CAR_DECORATION_TOTAL"
        operator: "<="
        value: 780
